name: CET Production Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: [self-hosted, Linux]

    steps:
      - name: Deploy to VPS
        run: |
          cd /var/www/cet/CET
          git fetch origin master
          git reset --hard origin/master
          docker compose up -d --build --remove-orphans
          docker image prune -f
